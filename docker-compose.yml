services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=jobtracker;Username=postgres;Password=postgres
      - Jwt__Key=JobTrackerSuperSecretKey2024MinimumThirtyTwoChars!
      - Jwt__Issuer=JobTrackerAPI
      - Jwt__Audience=JobTrackerClient
    depends_on:
      - db

volumes:
  postgres_data: